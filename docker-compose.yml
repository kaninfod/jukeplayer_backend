version: "3.8"

services:
  # Gonic - Subsonic-compatible music server
  gonic:
    image: sentriz/gonic:latest
    container_name: jukeplayer_gonic
    environment:
      - TZ=${TZ:-UTC}
      # optionally, see more available env vars in the readme
    ports:
      - "4747:80"
    networks:
      - unified_network
    
    volumes:
      - /home/pi/gonic/data:/data                    # gonic db etc
      - /mnt/music/collection:/music:ro              # your music collection
      - /home/pi/gonic/podcasts:/podcasts            # podcasts
      - /home/pi/gonic/playlists:/playlists          # playlists
      - /home/pi/gonic/tmp:/cache                    # transcode / covers / cache
    
    logging:
      driver: syslog
      options:
        syslog-address: "udp://192.168.68.102:514"
        tag: "GONIC"
        syslog-facility: "daemon"
        syslog-format: "rfc5424"
    
    # Uncomment if using jukebox with audio output on host
    #group_add:
    #  - audio
    #devices:
    #  - /dev/snd:/dev/snd
    
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # JukePlayer - MediaPlayer API for the jukebox
  jukeplayer:
    # OPTION A: Build locally (uncomment below)
    build:
      context: .
      dockerfile: Dockerfile
    
    # OPTION B: Use pre-built image from GitHub Container Registry (uncomment below)
    #image: ghcr.io/martinhinge/jukeplayer-jukeplayer:latest
    
    container_name: jukeplayer_api
    
    environment:
      # === SERVER ===
      - TZ=${TZ:-UTC}
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=${SERVER_PORT:-8001}
      - DEBUG_MODE=${DEBUG_MODE:-false}
      - ENABLE_DOCS=${ENABLE_DOCS:-true}

      # === LOGGING ===
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FILE=${LOG_FILE:-logs/jukebox.log}
      - LOG_SERVER_HOST=${LOG_SERVER_HOST:-}
      - LOG_SERVER_PORT=${LOG_SERVER_PORT:-514}

      # === SECURITY ===
      - API_KEY=${API_KEY:-your-local-api-key-here-min-32-chars-12345678}
      - ENABLE_HTTPS_REDIRECT=${ENABLE_HTTPS_REDIRECT:-false}
      - ALLOW_LOCAL_API_BYPASS=${ALLOW_LOCAL_API_BYPASS:-true}

      # === SUBSONIC / GONIC ===
      # In Docker, use gonic service name instead of IP
      - SUBSONIC_URL=${SUBSONIC_URL:-http://gonic:80}
      - SUBSONIC_CAST_BASE_URL=${SUBSONIC_CAST_BASE_URL:-http://gonic:80}
      - SUBSONIC_USER=${SUBSONIC_USER:-}
      - SUBSONIC_PASS=${SUBSONIC_PASS:-}
      - SUBSONIC_CLIENT=${SUBSONIC_CLIENT:-JukeboxPi}
      - SUBSONIC_API_VERSION=${SUBSONIC_API_VERSION:-1.16.1}

      # === AUDIO OUTPUT ===
      - PLAYBACK_BACKEND=${PLAYBACK_BACKEND:-chromecast}
      - CHROMECAST_DEVICES=${CHROMECAST_DEVICES:-}
      - DEFAULT_CHROMECAST_DEVICE=${DEFAULT_CHROMECAST_DEVICE:-}
      - CHROMECAST_DISCOVERY_TIMEOUT=${CHROMECAST_DISCOVERY_TIMEOUT:-3}
      - CHROMECAST_WAIT_TIMEOUT=${CHROMECAST_WAIT_TIMEOUT:-10}

      # === DATABASE ===
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./jukebox.db}

      # === NETWORK ===
      - HTTP_REQUEST_TIMEOUT=${HTTP_REQUEST_TIMEOUT:-10}
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-}
    
    ports:
      - "8001:8001"
    
    networks:
      - unified_network
    
    volumes:
      - /home/pi/jukeplayer/data:/app/data           # Database, cache
      - /home/pi/jukeplayer/logs:/app/logs           # Application logs
    
    depends_on:
      gonic:
        condition: service_healthy
    
    logging:
      driver: syslog
      options:
        syslog-address: "udp://192.168.68.102:514"
        tag: "JUKEPLAYER"
        syslog-facility: "daemon"
        syslog-format: "rfc5424"
    
    restart: unless-stopped

networks:
  unified_network:
    external: true

# Optional: define volumes if using named volumes instead of host paths
# volumes:
#   gonic_data:
#   jukeplayer_data:
