{# Top-level groups view for media library (HTMX server-driven) #}
<div class="library-cards-container">
  <div class="row g-3">
    {% for g in groups %}
      <div class="col-4">
        <button class="card library-group-card"
                onclick="window.kioskOpenLibraryGroup('{{ g.name }}');">
          <div class="card-body text-center">
            <h2 class="display-4">{{ g.name }}</h2>
          </div>
        </button>
      </div>
    {% endfor %}
  </div>
</div>
