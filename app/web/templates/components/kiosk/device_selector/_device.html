{# Single device card partial #}
<div class="card h-100 device-card {{ 'active' if device.active else '' }}" 
    data-action="click->device#switchDevice"
    data-device-device-backend-param="{{ device.backend|e }}"
    data-device-device-id-param="{{ device.device|e }}"
    >
    <div class="card-body d-flex flex-column align-items-center justify-content-center text-center p-4">
       <i class="mdi {{ device.icon  }} device-icon"></i>
        <h5 class="mt-3 mb-0">{{ device.name|e }}</h5>

       <small class="text-muted mt-1">{{ device.backend|e }}</small>

        {% if device.active %}
        <small class="text-success mt-1"><i class="mdi mdi-check-circle"></i> Active</small>
        {% else %}
        <small class="text-muted mt-1">Tap to select</small>
        {% endif %}
    </div>
</div>
