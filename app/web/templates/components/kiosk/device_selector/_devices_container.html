{# Container partial for device cards #}
{% if not status_data.devices %}
<div style="grid-column: 1 / -1;" class="text-center text-muted py-5">
    <i class="mdi mdi-speaker-off" style="font-size: 48px;"></i>
    <p class="mt-3">No output devices found</p>
</div>
{% else %}
<div class="container">
  <div class="gap-3 justify-content-left overflow-auto d-flex flex-row">
    {% for device in status_data.devices  %}
      {% set is_active = device.active %}
      <div class="col">
        {% include 'components/kiosk/device_selector/_device.html' %}
      </div>
    {% endfor %}
  </div>
</div>
{% endif %}
