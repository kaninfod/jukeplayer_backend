<!-- Kiosk Navigation Sidebar (60px width) -->
<div class="kiosk-nav-sidebar d-flex flex-column gap-3">
    <button class="kiosk-nav-btn btn" onclick="window.kioskOpenLibrary();" title="Media Library">
        <i class="mdi mdi-folder-music"></i>
    </button>
    <button class="kiosk-nav-btn btn" onclick="window.kioskOpenPlaylist();" title="Current Playlist">
        <i class="mdi mdi-playlist-music"></i>
    </button>
    <button class="kiosk-nav-btn btn" onclick="window.kioskOpenSystem();" title="System Menu">
        <i class="mdi mdi-cog"></i>
    </button>
</div>
